name: Deploy to server

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-gpos-webapp
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -e
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          PORT="${SSH_PORT:-22}"
          ssh-keyscan -p "${PORT}" -H "${SSH_HOST}" >> ~/.ssh/known_hosts

      - name: Rsync app to server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_DEPLOY_PATH: ${{ secrets.SSH_DEPLOY_PATH }}
        run: |
          set -euo pipefail
          REMOTE="${SSH_DEPLOY_PATH:-/opt/gposapp}"
          PORT="${SSH_PORT:-22}"
          RSYNC_SSH="ssh -p ${PORT} -o StrictHostKeyChecking=yes"
          rsync -avz --delete \
            -e "${RSYNC_SSH}" \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'dist' \
            --exclude 'dist-ssr' \
            --exclude 'backup' \
            --exclude 'old files only for read' \
            ./ "${SSH_USER}@${SSH_HOST}:${REMOTE}/"

      - name: Backup, build, and restart containers
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_DEPLOY_PATH: ${{ secrets.SSH_DEPLOY_PATH }}
        run: |
          set -euo pipefail
          REMOTE="${SSH_DEPLOY_PATH:-/opt/gposapp}"
          PORT="${SSH_PORT:-22}"
          ssh -p "${PORT}" -o StrictHostKeyChecking=yes "${SSH_USER}@${SSH_HOST}" bash -s <<EOF
          set -euo pipefail
          cd "${REMOTE}"
          chmod +x gpos-webapp.sh backup-before-deploy.sh 2>/dev/null || true
          ./backup-before-deploy.sh
          ./gpos-webapp.sh
          EOF
